name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check app tests

      - name: Format check
        run: python -m ruff format --check app tests

      - name: Type check
        run: >-
          python -m mypy
          --follow-imports=skip
          app/adapters/process/subprocess_runner.py
          app/bot/middleware/auth.py
          app/bot/middleware/rate_limit.py
          app/bot/handlers/command_permission.py
          app/bot/handlers/command_user_question.py
          app/bootstrap.py
          app/services/task_service.py

      - name: Test
        run: python -m pytest -q
