name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check app tests

      - name: Ruff format
        run: python -m ruff format --check app tests

      - name: Type check
        run: >-
          python -m mypy
          --follow-imports=skip
          app/adapters/process/subprocess_runner.py
          app/bot/middleware/auth.py
          app/bot/middleware/rate_limit.py
          app/bot/handlers/command_permission.py
          app/bot/handlers/command_user_question.py
          app/bootstrap.py
          app/services/task_service.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test with coverage
        run: python -m pytest -q --cov=app --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
