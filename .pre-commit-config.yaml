default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # ---- pre-commit 阶段：快速检查（Requirement 2） ----
      - id: ruff-check
        name: ruff check app tests (lint, autofix)
        entry: python -m ruff check --fix app tests
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format app tests
        entry: python -m ruff format app tests
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]

      # ---- pre-push 阶段：慢速检查（Requirement 3） ----
      - id: mypy
        name: mypy app/ (full codebase)
        entry: python -m mypy app/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest
        name: pytest -q
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
