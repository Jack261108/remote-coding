default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # ---- pre-commit 阶段：快速检查（Requirement 2） ----
      - id: ruff-check
        name: ruff check app tests (lint, autofix)
        entry: python -m ruff check --fix app tests
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format app tests
        entry: python -m ruff format app tests
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-commit]

      # ---- pre-push 阶段：慢速检查（Requirement 3） ----
      - id: mypy
        name: mypy --follow-imports=skip (7 files)
        entry: >-
          python -m mypy --follow-imports=skip
          app/adapters/process/subprocess_runner.py
          app/bot/middleware/auth.py
          app/bot/middleware/rate_limit.py
          app/bot/handlers/command_permission.py
          app/bot/handlers/command_user_question.py
          app/bootstrap.py
          app/services/task_service.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest
        name: pytest -q
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
